<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TizenCast</title>
    <script src="fcast-receiver-sdk.js"></script>
    <script src="main.js"></script>
    <style>
        :root {
            --accent-color: #3498db;
            --bg-gradient: radial-gradient(circle at center, #1a1a2e 0%, #020205 100%);
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #idle-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; background: var(--bg-gradient);
            transition: opacity 1s ease; z-index: 5;
        }
        #cast-logo {
            width: 180px; filter: drop-shadow(0 0 30px rgba(52, 152, 219, 0.4));
            animation: pulse 4s infinite ease-in-out; margin-bottom: 30px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        #status {
            font-size: 2rem; font-weight: 300; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #ip-info { font-size: 1.1rem; color: rgba(255, 255, 255, 0.5); font-weight: 300; }
        #player {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: none; z-index: 10;
        }
        body.casting #idle-screen { display: none; }
        body.casting #player { display: block; }
    </style>
</head>
<body>
    <div id="idle-screen">
        <img src="../icon.png" id="cast-logo" alt="TizenCast Logo">
        <div id="status">Ready to Cast</div>
        <div id="ip-info">Fetching Network Info...</div>
    </div>
    <video id="player" crossorigin="anonymous"></video>
    <script>
        const video = document.getElementById('player');
        const body = document.body;

        window.addEventListener('fcast-stream-start', (e) => {
            body.classList.add('casting');
            if (e.detail && e.detail.url) {
                video.src = e.detail.url;
                video.play();
            }
        });

        window.addEventListener('fcast-stream-stop', () => {
            body.classList.remove('casting');
            video.pause();
            video.src = "";
        });

        window.addEventListener('keydown', function(e) {
            if (e.keyCode === 10009 && body.classList.contains('casting')) {
                if (window.fcast) window.fcast.stop();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
